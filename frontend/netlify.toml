[build]
base = "frontend"
command = "npm run build"
publish = "build"

[build.environment]
NODE_VERSION = "18"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
environment = { REACT_APP_ENV = "production" }

[context.deploy-preview]
environment = { REACT_APP_ENV = "preview" }

[context.branch-deploy]
environment = { REACT_APP_ENV = "dev" }
